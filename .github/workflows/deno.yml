# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno lint

      - name: Run tests
        run: deno task test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    # Only deploy from the main branch, never from pull requests.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write # required for Deno Deploy OIDC auth
      contents: read
    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          # TODO: set this to your Deno Deploy project name (dash.deno.com).
          project: "92-subaru"
          entrypoint: "server/main.ts"
          root: "."
